<!DOCTYPE html>
<html lang="be">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Client portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@600;700&family=Manrope:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117; --surface: #1a1f2e; --surface2: #222840;
      --border: #2a2f45; --text: #e2e8f0; --muted: #6b7280;
      --accent: #f97316; --error: #ef4444; --success: #22c55e;
      --radius: 10px;
    }
    html { min-height: 100%; background: var(--bg); }
    body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: radial-gradient(ellipse at 30% 50%, #1a1f35 0%, var(--bg) 70%); font-family: 'Manrope', sans-serif; color: var(--text); padding: 20px; }
    .login-box { width: 100%; max-width: 420px; padding: 48px 40px; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; box-shadow: 0 32px 80px rgba(0,0,0,0.5); }
    /* кабінет: акно запаўняе ўвесь iframe кут-у-кут — без цёмнай рамкі/краю/ценю вакол */
    /* кабінет = flex-калонка на ўсю вышыню акна: гісторыя чата сціскаецца, радок уводу + чыпы файлаў ПРЫЛІПЛЕНЫ ЎНІЗЕ і заўсёды бачны */
    .login-box.cab { max-width: none; padding: 24px 16px; border: none; border-radius: 0; box-shadow: none; height: 100vh; display: flex; flex-direction: column; }
    .login-box.cab #step-orders.active { display: flex; flex-direction: column; flex: 1; min-height: 0; }
    /* два віды: Чат (flex-калонка на ўвесь астатак) і Кабінет (профіль+заказы, скрол) — перамыкаюцца табамі */
    .login-box.cab #view-chat.active { flex: 1; display: flex; flex-direction: column; min-height: 0; }
    .login-box.cab #cab-chat-wrap { flex: 1; display: flex; flex-direction: column; min-height: 0; }
    .login-box.cab #portal-chat-feed { flex: 1; min-height: 0; max-height: none; } /* гісторыя займае астатак і сціскаецца, аддаючы месца радку+чыпам */
    .login-box.cab #view-cabinet.active { flex: 1; min-height: 0; overflow-y: auto; }
    .cab-view { display: none; }
    .cab-view.active { display: block; }
    /* табы перамыкача відаў */
    #cab-tabs { display: flex; gap: 6px; margin-bottom: 12px; flex-shrink: 0; margin-top: 8px; }
    .cab-tab { flex: 1; padding: 9px 8px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); color: var(--muted); font-family: 'Manrope', sans-serif; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.15s; }
    .cab-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    /* картка профілю кабінета */
    .prof-name { font-family: 'Unbounded', sans-serif; font-size: 1.15rem; font-weight: 700; color: var(--text); margin-bottom: 4px; }
    .prof-row { font-size: 0.9rem; color: var(--muted); margin-top: 6px; display: flex; align-items: center; gap: 8px; }
    .prof-row b { color: var(--text); font-weight: 600; }
    .prof-sec-title { font-family: 'Unbounded', sans-serif; font-size: 0.95rem; font-weight: 600; margin: 18px 0 8px; }
    body.cab-body { padding: 0; } /* прыбіраем цёмны фон iframe па краях акна кабінета */
    .login-box.cab .login-logo { margin-top: 26px; } /* дамен ніжэй — каб не перасякаўся з крыжыкам ✕ у верхнім левым куце */
    .login-logo { font-family: 'Unbounded', sans-serif; font-size: 1.4rem; font-weight: 700; color: var(--accent); margin-bottom: 8px; }
    .login-sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 18px; }
    .field-label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
    .field-input { width: 100%; padding: 12px 16px; background: var(--surface2); border: 1.5px solid var(--border); border-radius: var(--radius); color: var(--text); font-family: 'Manrope', sans-serif; font-size: 1rem; transition: border-color 0.2s; margin-bottom: 20px; outline: none; }
    .field-input:focus { border-color: var(--accent); }
    .btn-primary { width: 100%; padding: 14px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius); font-family: 'Unbounded', sans-serif; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: opacity 0.2s, transform 0.1s; }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .error-msg { color: var(--error); font-size: 0.85rem; margin-top: 12px; text-align: center; min-height: 20px; }
    .back-link { background: none; border: none; color: var(--muted); font-size: 13px; cursor: pointer; margin-top: 14px; padding: 4px; text-decoration: underline; font-family: 'Manrope', sans-serif; display: block; text-align: center; }
    .back-link:hover { color: var(--text); }
    .order-card { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 10px; }
    .order-id { font-weight: 700; font-size: 0.9rem; margin-bottom: 6px; }
    .order-badge { display: inline-block; font-size: 0.78rem; border-radius: 5px; padding: 2px 8px; margin-bottom: 6px; }
    .order-row { font-size: 0.83rem; color: var(--muted); margin-top: 4px; }
    .order-row a { color: var(--accent); text-decoration: none; }
    .step { display: none; }
    .step.active { display: block; }
  </style>
</head>
<body>
<div class="login-box" style="position:relative">
  <!-- ✕ закрыць кабінет — толькі калі адкрыты як оверлей на сайце (у iframe); закрывае бацькоўскі оверлей без разлагіну -->
  <button id="portal-close" onclick="portalCloseCabinet()" aria-label="✕"
    style="display:none;position:absolute;top:12px;left:14px;z-index:2;width:30px;height:30px;border-radius:50%;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:0.95rem;line-height:1;cursor:pointer">✕</button>
  <!-- 🌐 мова кабінета (тая ж localStorage ttzop_lang, што і сайт) — просьба карыстальніка: кнопка Мовы ў мадалцы -->
  <select id="portal-lang" onchange="portalSetLang(this.value)"
    style="position:absolute;top:14px;right:14px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Manrope',sans-serif;font-size:0.8rem;padding:5px 8px;cursor:pointer"></select>
  <div class="login-logo" id="portal-logo">TTZOP</div>
  <div class="login-sub" id="portal-sub"></div>

  <!-- Step 1: Email -->
  <div class="step active" id="step-email">
    <label class="field-label">Email</label>
    <input class="field-input" type="email" id="portal-email" placeholder="you@example.com" />
    <button class="btn-primary" id="s1-btn" onclick="portalSendCode()"></button>
    <div class="error-msg" id="s1-msg"></div>
  </div>

  <!-- Step 2: Code -->
  <div class="step" id="step-code">
    <div style="color:var(--muted);font-size:0.87rem;margin-bottom:24px" id="s2-desc"></div>
    <label class="field-label" id="s2-label"></label>
    <input class="field-input" type="text" id="portal-code" maxlength="6" inputmode="numeric" />
    <button class="btn-primary" id="s2-btn" onclick="portalVerifyCode()"></button>
    <div class="error-msg" id="s2-msg"></div>
    <button class="back-link" id="s2-back" onclick="showStep('email')"></button>
  </div>

  <!-- Step 3: Кабінет — два віды (💬 Чат / 👤 Кабінет) з перамыкачом-табамі -->
  <div class="step" id="step-orders">
    <div id="cab-tabs">
      <button class="cab-tab" id="tab-chat" onclick="portalSetView('chat')"></button>
      <button class="cab-tab" id="tab-cabinet" onclick="portalSetView('cabinet')"></button>
    </div>

    <!-- ВІД: 💬 Чат з кампаніяй (Фаза 2 Чатаў: from_kind='client'). flex-калонка: гісторыя сціскаецца, радок+чыпы прыліплены ўнізе -->
    <div class="cab-view" id="view-chat">
      <div id="cab-chat-wrap">
        <div style="font-family:'Unbounded',sans-serif;font-size:1rem;font-weight:600;margin-bottom:6px;flex-shrink:0" id="chat-title"></div>
        <div id="portal-chat-feed" style="max-height:55vh;min-height:300px;overflow-y:auto;display:flex;flex-direction:column;gap:8px;padding:4px 0"></div><!-- у кабінеце flex:1 (сціскаецца), пакідае месца радку+чыпам -->
        <div style="display:flex;gap:8px;margin-top:8px;align-items:stretch;flex-shrink:0"><!-- радок уводу — заўсёды бачны ўнізе -->
          <button style="background:none;border:1px solid var(--border);border-radius:var(--radius);color:var(--text);cursor:pointer;padding:0 12px;flex-shrink:0" title="📷" onclick="document.getElementById('portal-chat-file').click()">📎</button>
          <input type="file" id="portal-chat-file" accept="image/*" style="display:none" onchange="portalChatAttach(this)" />
          <textarea class="field-input" id="portal-chat-input" rows="2" style="margin-bottom:0;resize:none;min-height:52px;flex:1" maxlength="4000"></textarea><!-- поле ў дзве строчкі -->
          <button class="btn-primary" id="chat-send-btn" style="width:auto;padding:0 16px;flex-shrink:0;font-size:1.2rem" onclick="portalChatSend()">➤</button><!-- заўсёды іконка ➤ (як у панэлі) -->
        </div>
        <!-- чыпы фота з ✕ — ПАД радком уводу; max-height ~1.5 радка + скрол = бачна цэлы радок і палова наступнага (намёк на працяг) -->
        <div id="portal-chat-atts" style="font-size:0.8rem;color:var(--muted);max-height:62px;overflow-y:auto;display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;flex-shrink:0"></div>
      </div>
    </div>

    <!-- ВІД: 👤 Кабінет — профіль кліента (Імя/Email/Тэлефон) + Мае заказы. Праўка/адрасы/аплата — Фаза C -->
    <div class="cab-view" id="view-cabinet">
      <div id="cab-profile"></div>
      <div id="cab-addresses"></div><!-- C2a: кніга адрасоў дастаўкі -->
      <div id="cab-payment"></div><!-- C3-1: 💳 Спосаб аплаты — рэквізіты + інструкцыі (payload.payment) -->
      <div id="cab-appts"></div><!-- 📅 Мае запісы (payload.appointments) -->
      <div id="cab-subs"></div><!-- 🔁 S1: Мае падпіскі (payload.subscriptions) -->
      <div class="prof-sec-title" id="my-orders-title"></div>
      <div id="portal-orders"></div>
    </div>
  </div>
</div>

<script src="assets/js/reader.js"></script><!-- 📄 універсальны чытач дакумента (фактура — paper) -->
<script src="assets/js/slots-modal.js"></script><!-- 📅 тая ж мадалка слотаў, што на сайце (тут — перанос запісу) -->

const API = 'https://ttzop-api.truetensites.workers.dev';
const REPO = (() => {
  const h = location.hostname;
  if (h === 'localhost' || h.endsWith('.pages.dev')) return 'ttzop-test';
  const parts = h.split('.');
  return parts.length >= 3 ? parts[0] : 'ttzop-test';
})();

document.getElementById('portal-logo').textContent = REPO.toUpperCase();

let PT = PORTAL_T.be;
let ST = STATUS_T.be;
let portalEmail = '';
let portalToken = localStorage.getItem('ttzop_portal_token') || ''; // сесія кабінета 30 дзён — «памятаем» наведвальніка
// які від паказаць пасля ўваходу: chat (дэфолт) / cabinet — з location.hash (навбар-меню сайта дае #chat/#cabinet)
let portalView = (location.hash.replace('#', '') === 'cabinet') ? 'cabinet' : 'chat';
let lastCabData = null; // апошні payload (portal_me/verify) — для рэндэру профілю пры перамыканні відаў

function detectPortalLang() {
  const saved = localStorage.getItem('ttzop_lang');
  if (saved && PORTAL_T[saved]) return saved;
  const nav = navigator.language?.split('-')[0];
  if (nav && PORTAL_T[nav]) return nav;
  return 'be';
}

function applyPortalLang() {
  const lang = detectPortalLang();
  PT = PORTAL_T[lang] || PORTAL_T.be;
  ST = STATUS_T[lang] || STATUS_T.be;
  const isRtl = lang === 'ar';
  document.documentElement.lang = lang;
  document.documentElement.dir = isRtl ? 'rtl' : 'ltr';
  document.title = PT.title;
  document.getElementById('portal-sub').textContent = PT.title;
  document.getElementById('s1-btn').textContent = PT.get_code;
  document.getElementById('s2-label').textContent = PT.code_label;
  document.getElementById('portal-code').placeholder = PT.code_ph;
  document.getElementById('s2-btn').textContent = PT.confirm;
  document.getElementById('s2-back').textContent = PT.back;
  document.getElementById('my-orders-title').textContent = PT.my_orders;
  document.getElementById('tab-chat').textContent = '💬 ' + PT.tab_chat;
  document.getElementById('tab-cabinet').textContent = '👤 ' + PT.tab_cabinet;
  document.getElementById('chat-title').textContent = PT.chat_title;
  if (lastCabData) { renderCabinetProfile(lastCabData); renderCabinetPayment(); renderCabinetAppts(); renderCabinetSubs(); } // перамалёўка профілю + аплаты + падпісак на новую мову
  document.getElementById('portal-chat-input').placeholder = PT.chat_ph;
  document.getElementById('chat-send-btn').title = PT.chat_send; // кнопка = іконка ➤, тэкст у title (даступнасць)
}

function showStep(step) {
  document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
  document.getElementById('step-' + step).classList.add('active');
  // кабінет (заказы+чат) — шырокі рэжым: акно на ўсю шырыню, менш бакавых водступаў (больш месца чату);
  // login/code — вузкая цэнтраваная форма (як было)
  document.querySelector('.login-box').classList.toggle('cab', step === 'orders');
  document.body.classList.toggle('cab-body', step === 'orders'); // прыбраць цёмны край iframe вакол акна кабінета
}

function setMsg(id, text) {
  document.getElementById(id).textContent = text;
}

async function portalSendCode() {
  const email = document.getElementById('portal-email').value.trim();
  if (!email) { setMsg('s1-msg', PT.err_enter_email); return; }
  const btn = document.getElementById('s1-btn');
  btn.disabled = true; btn.textContent = '...';
  setMsg('s1-msg', '');
  try {
    const res = await fetch(API, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'portal_send_code', repo: REPO, email, lang: detectPortalLang() })
    });
    await res.json(); // код ідзе ЛЮБОМУ email (новы наведвальнік = рэгістрацыя; Кліент створыцца пасля верыфікацыі)
    portalEmail = email;
    document.getElementById('s2-desc').textContent = PT.code_sent.replace('{email}', email);
    showStep('code');
  } catch {
    setMsg('s1-msg', PT.err_conn);
  }
  btn.disabled = false; btn.textContent = PT.get_code;
}

async function portalVerifyCode() {
  const code = document.getElementById('portal-code').value.trim();
  if (code.length !== 6) { setMsg('s2-msg', PT.err_enter_code); return; }
  const btn = document.getElementById('s2-btn');
  btn.disabled = true; btn.textContent = '...';
  setMsg('s2-msg', '');
  try {
    const res = await fetch(API, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'portal_verify_code', repo: REPO, email: portalEmail, code })
    });
    if (!res.ok) { setMsg('s2-msg', PT.err_wrong_code); btn.disabled = false; btn.textContent = PT.confirm; return; }
    const data = await res.json();
    portalToken = data.token || '';
    localStorage.setItem('ttzop_portal_token', portalToken); // сесія 30 дзён — наступны раз без кода
    localStorage.setItem('ttzop_portal_email', data.email || portalEmail); // прэфіл заказу на сайце (заказ без паўторнага кода)
    enterCabinet(data);
  } catch {
    setMsg('s2-msg', PT.err_conn);
  }
  btn.disabled = false; btn.textContent = PT.confirm;
}

// ─── Кабінет: агульны ўваход (пасля кода І пасля аўта-ўваходу) ───
function enterCabinet(data) {
  lastCabData = data;
  renderOrders(data);
  renderCabinetProfile(data);
  renderCabinetAddresses();
  renderCabinetPayment(); // C3-1: 💳 Спосаб аплаты
  renderCabinetAppts(); // 📅 Мае запісы
  renderCabinetSubs(); // 🔁 S1: Мае падпіскі
  showStep('orders');
  portalSetView(portalView); // від, з якім адкрылі (навбар-меню сайта: chat/cabinet)
  startChatPoll();
  portalSubIntentApply(); // 🔁 S1: намер «Падпісацца» з карткі сайта (пасля ўваходу)
}

// перамыкач відаў Чат/Кабінет (табы ўнутры + навбар-меню сайта)
function portalSetView(v) {
  portalView = (v === 'cabinet') ? 'cabinet' : 'chat';
  document.getElementById('view-chat').classList.toggle('active', portalView === 'chat');
  document.getElementById('view-cabinet').classList.toggle('active', portalView === 'cabinet');
  document.getElementById('tab-chat').classList.toggle('active', portalView === 'chat');
  document.getElementById('tab-cabinet').classList.toggle('active', portalView === 'cabinet');
  if (portalView === 'chat') { const f = document.getElementById('portal-chat-feed'); if (f) f.scrollTop = f.scrollHeight; _chatPrefillApply(); }
}
// прадзапаўненне чата з сайта (📅 «Запісацца» на картцы паслугі кладзе тэкст у localStorage; same-origin iframe)
function _chatPrefillApply() {
  try {
    const v = localStorage.getItem('ttzop_chat_prefill'); if (!v) return;
    const inp = document.getElementById('portal-chat-input');
    if (inp && !inp.value) { inp.value = v; inp.focus(); }
    localStorage.removeItem('ttzop_chat_prefill'); // аднаразова — не ўсплываць пры наступных адкрыццях
  } catch {}
}

// профіль кліента ў відзе «Кабінет»: Імя (загаловак) + Email + Тэлефон (іконкі, без тэкст-лэйблаў = без хардкоду).
// ✎ праўка Імя/Тэлефона (append профілю ў D1) і замена Email (код на новы email). Адрасы/аплата — C2/C3.
let cabEmailPending = ''; // новы email, на які дасланы код (крок замены email)
const _editBtn = fn => `<button onclick="${fn}" title="✎" style="background:none;border:none;color:var(--accent);cursor:pointer;font-size:0.95rem;padding:2px 4px">✎</button>`;
function renderCabinetProfile(data) {
  const el = document.getElementById('cab-profile');
  if (!el) return;
  cabEmailPending = '';
  const name = data.name || data.email || '';
  el.innerHTML = `
    <div style="display:flex;align-items:center;gap:6px"><div class="prof-name" style="margin-bottom:0">${escChat(name)}</div>${_editBtn('cabProfileEdit()')}</div>
    ${data.email ? `<div class="prof-row">✉️ <b>${escChat(data.email)}</b> ${_editBtn('cabEmailEdit()')}</div>` : ''}
    <div class="prof-row">📞 <b>${data.phone ? escChat(data.phone) : '—'}</b> ${_editBtn('cabProfileEdit()')}</div>
    <div class="error-msg" id="cab-prof-msg" style="min-height:0;text-align:left;margin-top:8px"></div>`;
}

function cabProfileEdit() {
  const el = document.getElementById('cab-profile');

  el.innerHTML = `
    <label class="field-label">✉️ ${escChat(d.email || '')}</label>
    <input class="field-input" id="cab-name" placeholder="${escChat(PT.tab_cabinet)}" value="${escChat(d.name || '')}" />

    <div class="error-msg" id="cab-prof-msg" style="min-height:0"></div>`;
}
async function cabProfileSave() {
  const name = document.getElementById('cab-name').value.trim();
  const phone = document.getElementById('cab-phone').value.trim();
  const btn = document.getElementById('cab-prof-save'); btn.disabled = true; btn.textContent = '...';
  try {
    const res = await fetch(API, { method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'portal_update_profile', repo: REPO, token: portalToken, name, phone }) });
    if (!res.ok) throw new Error();
    lastCabData = await res.json();
    renderCabinetProfile(lastCabData);
    const m = document.getElementById('cab-prof-msg'); if (m) { m.style.color = 'var(--success)'; m.textContent = PT.saved; setTimeout(() => { if (m) m.textContent = ''; }, 2000); }

      <button class="back-link" onclick="renderCabinetProfile(lastCabData)">${escChat(PT.back)}</button>
      <div class="error-msg" id="cab-prof-msg" style="min-height:0"></div>`;
  } catch { msg.textContent = PT.err_conn; btn.disabled = false; btn.textContent = PT.get_code; }
}
async function cabEmailConfirm() {
  const code = document.getElementById('cab-email-code').value.trim();
  const msg = document.getElementById('cab-prof-msg'); msg.style.color = 'var(--error)';
  if (code.length !== 6) { msg.textContent = PT.err_enter_code; return; }
  const btn = document.getElementById('cab-email-confirm'); btn.disabled = true; btn.textContent = '...';
  try {
    const res = await fetch(API, { method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'portal_change_email', repo: REPO, token: portalToken, email: cabEmailPending, code }) });
    if (res.status === 409) { msg.textContent = PT.email_taken; btn.disabled = false; btn.textContent = PT.confirm; return; }
    if (res.status === 401) { msg.textContent = PT.err_wrong_code; btn.disabled = false; btn.textContent = PT.confirm; return; }
    if (!res.ok) throw new Error();
    lastCabData = await res.json();
    localStorage.setItem('ttzop_portal_email', lastCabData.email || cabEmailPending); // сайт-прэфіл заказу = новы email
    renderCabinetProfile(lastCabData);
    const m = document.getElementById('cab-prof-msg'); if (m) { m.style.color = 'var(--success)'; m.textContent = PT.saved; setTimeout(() => { if (m) m.textContent = ''; }, 2000); }
  } catch { msg.textContent = PT.err_conn; btn.disabled = false; btn.textContent = PT.confirm; }
}

// ── C2a: кніга адрасоў дастаўкі (спіс/дадаць/праўка/выдаліць/асноўны) ──
function _cabAddrList() { return Array.isArray(lastCabData?.addresses) ? lastCabData.addresses : []; }
function renderCabinetAddresses() {
  const el = document.getElementById('cab-addresses');
  if (!el) return;
  const list = _cabAddrList();
  const rows = list.map(a => `
    <div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;margin-bottom:8px">
      <div style="display:flex;align-items:center;gap:8px">
        <div style="flex:1;min-width:0">
          ${a.label ? `<div style="font-weight:600;font-size:0.9rem;color:var(--text)">${escChat(a.label)}${a.isDefault ? ` <span style="font-size:0.72rem;color:var(--accent)">★ ${escChat(PT.addr_default)}</span>` : ''}</div>` : (a.isDefault ? `<div style="font-size:0.72rem;color:var(--accent)">★ ${escChat(PT.addr_default)}</div>` : '')}
          <div style="font-size:0.85rem;color:var(--muted)">${escChat(a.text)}</div>
          ${a.zoneId && _cabZones().find(z => z.id === a.zoneId) ? `<div style="font-size:0.75rem;color:var(--accent)">🚚 ${escChat(_cabZones().find(z => z.id === a.zoneId).name)}</div>` : ''}
        </div>
        <button title="★" onclick="cabAddrDefault('${a.id}')" style="background:none;border:none;color:${a.isDefault ? 'var(--accent)' : 'var(--muted)'};cursor:pointer;font-size:1rem;padding:2px 4px">${a.isDefault ? '★' : '☆'}</button>
        <button title="✎" onclick="cabAddrEdit('${a.id}')" style="background:none;border:none;color:var(--accent);cursor:pointer;font-size:0.95rem;padding:2px 4px">✎</button>
        <button title="✕" onclick="cabAddrDelete('${a.id}')" style="background:none;border:none;color:var(--error);cursor:pointer;font-size:0.9rem;padding:2px 4px">✕</button>
      </div>
    </div>`).join('');
  el.innerHTML = `
    <div class="prof-sec-title">📦 ${escChat(PT.addr_title)}</div>
    ${list.length ? rows : `<div style="color:var(--muted);font-size:0.85rem;margin-bottom:8px">${escChat(PT.addr_none)}</div>`}
    <button class="btn-primary" style="padding:10px" onclick="cabAddrEdit('')">➕ ${escChat(PT.addr_add)}</button>
    <div class="error-msg" id="cab-addr-msg" style="min-height:0;text-align:left;margin-top:6px"></div>`;
}
function _cabZones() { return Array.isArray(lastCabData?.delivery?.zones) ? lastCabData.delivery.zones : []; }
function cabAddrEdit(id) {
  const el = document.getElementById('cab-addresses');
  const a = _cabAddrList().find(x => x.id === id) || { id: '', label: '', text: '', zoneId: '' };
  const zones = _cabZones();
  // выпадальнік зоны — толькі калі адмін наладзіў зоны дастаўкі (C2b)
  const zoneSel = zones.length ? `<select class="field-input" id="cab-addr-zone" style="cursor:pointer">
      <option value="">— ${escChat(PT.addr_zone || 'Зона')} —</option>
      ${zones.map(z => `<option value="${escChat(z.id)}"${z.id === a.zoneId ? ' selected' : ''}>${escChat(z.name)}${z.cost ? ' (' + z.cost + (lastCabData.delivery.currency ? ' ' + lastCabData.delivery.currency : '') + ')' : ''}</option>`).join('')}
    </select>` : '';
  el.innerHTML = `
    <div class="prof-sec-title">📦 ${escChat(PT.addr_title)}</div>
    <input class="field-input" id="cab-addr-label" placeholder="${escChat(PT.addr_label_ph)}" value="${escChat(a.label || '')}" maxlength="80" />
    <textarea class="field-input" id="cab-addr-text" rows="2" placeholder="${escChat(PT.addr_text_ph)}" style="resize:none" maxlength="300">${escChat(a.text || '')}</textarea>
    ${zoneSel}
    <div style="display:flex;gap:8px"><button class="btn-primary" id="cab-addr-save" onclick="cabAddrSaveForm('${a.id}')">${escChat(PT.confirm)}</button></div>
    <button class="back-link" onclick="renderCabinetAddresses()">${escChat(PT.back)}</button>
    <div class="error-msg" id="cab-addr-msg" style="min-height:0"></div>`;
}
function cabAddrSaveForm(id) {
  const label = document.getElementById('cab-addr-label').value.trim();
  const text = document.getElementById('cab-addr-text').value.trim();
  const zoneId = document.getElementById('cab-addr-zone')?.value || '';
  const msg = document.getElementById('cab-addr-msg'); msg.style.color = 'var(--error)';
  if (!text) { msg.textContent = PT.addr_text_ph; return; }
  const list = _cabAddrList().map(a => ({ ...a }));
  const ex = list.find(a => a.id === id);
  if (ex) { ex.label = label; ex.text = text; ex.zoneId = zoneId; }
  else list.push({ id: '', label, text, zoneId, isDefault: list.length === 0 }); // першы адрас = асноўны
  cabAddrPersist(list);
}
function cabAddrDelete(id) {
  portalConfirm('✕ ' + (_cabAddrList().find(a => a.id === id)?.text || ''), // кастомнае пацверджанне (сістэмны confirm забаронены)
    () => cabAddrPersist(_cabAddrList().filter(a => a.id !== id)), { danger: true });
}
function cabAddrDefault(id) {
  cabAddrPersist(_cabAddrList().map(a => ({ ...a, isDefault: a.id === id })));
}
async function cabAddrPersist(list) {
  try {
    const res = await fetch(API, { method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'portal_set_addresses', repo: REPO, token: portalToken, addresses: list }) });
    if (!res.ok) throw new Error();
    const d = await res.json();
    if (lastCabData) lastCabData.addresses = d.addresses || [];
    renderCabinetAddresses();
  } catch { const m = document.getElementById('cab-addr-msg'); if (m) { m.style.color = 'var(--error)'; m.textContent = PT.err_conn; } }
}

// ── C3-1: 💳 «Спосаб аплаты» — рэквізіты (payload.payment = settings.banking з панэлі, ○ Бягучы банк)
// + вольныя інструкцыі (ml — выбіраем мову кабінета); акцэнт-рамка калі ёсць заказ «чакае аплаты»
function _mlPortal(v) { // ml-аб'ект {мова:тэкст} → тэкст на мове кабінета (fallback: першае непустое)
  if (!v) return '';
  if (typeof v !== 'object') return String(v);
  return v[detectPortalLang()] || Object.values(v).find(x => x) || '';
}
function cabCopy(id, btn) { // 📋 скапіраваць тэкст элемента ў буфер + кароткі ✓-водгук (аналаг _copyEl панэлі)
  const txt = document.getElementById(id)?.textContent || '';
  const done = () => { const o = btn.textContent; btn.textContent = '✓'; setTimeout(() => { btn.textContent = o; }, 1200); };
  if (navigator.clipboard?.writeText) { navigator.clipboard.writeText(txt).then(done).catch(() => {}); }
  else { const ta = document.createElement('textarea'); ta.value = txt; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove(); done(); }
}
function renderCabinetPayment() {
  const el = document.getElementById('cab-payment');
  if (!el) return;
  const p = lastCabData?.payment;
  if (!p) { el.innerHTML = ''; return; } // рэквізітаў няма (банк не наладжаны) — секцыя не паказваецца
  // Прызначэнне — ТОЛЬКІ заказы «чакае аплаты»: радок на кожны заказ (адзін пералік = адзін заказ) з сумай і дэдлайнам (C3-1b)
  const awaiting = (lastCabData.orders || []).filter(o => o.status === 'awaiting_payment');
  const instr = _mlPortal(p.instructions);
  const copyBtn = (cid) => `<button title="📋" onclick="cabCopy('${cid}',this)" style="background:none;border:none;cursor:pointer;font-size:0.85rem;padding:1px 4px;color:var(--muted)">📋</button>`;
  const row = (label, val, cid) => val ? `<div class="prof-row" style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">${escChat(label)}: <b id="${cid}" style="word-break:break-all">${escChat(val)}</b>${copyBtn(cid)}</div>` : '';
  const dueRows = awaiting.map((o, i) => `
      <div class="prof-row" style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">${escChat(PT.pay_reference)}:
        <b id="pay-ref-${i}">#${escChat(o.id)}</b>${copyBtn('pay-ref-' + i)}
        ${_cabAmountsStr(o) ? `<span style="color:var(--accent);font-weight:600">${escChat(_cabAmountsStr(o))}</span>` : ''}
        ${o.until ? `<span style="color:var(--muted);font-size:0.8rem">· ${escChat(PT.pay_due)}: ${_cabDate(o.until)}</span>` : ''}
        <button title="🧾 ${escChat(PT.inv_title)}" onclick="portalInvoice('${escChat(o.id)}')" style="background:none;border:none;cursor:pointer;font-size:0.9rem;padding:1px 4px">🧾</button>
      </div>`).join('');
  el.innerHTML = `
    <div class="prof-sec-title">💳 ${escChat(PT.pay_title)}</div>
    <div style="background:var(--surface2);border:1px solid ${awaiting.length ? 'var(--accent)' : 'var(--border)'};border-radius:var(--radius);padding:12px 14px;margin-bottom:14px">
      ${row(PT.pay_recipient, p.accountHolder, 'pay-holder')}
      ${row(PT.pay_bank, p.bankName, 'pay-bank')}
      ${row('IBAN', p.iban, 'pay-iban')}
      ${row('BIC/SWIFT', p.bic, 'pay-bic')}
      ${dueRows}
      ${instr ? `<div style="white-space:pre-line;font-size:0.85rem;color:var(--text);margin-top:8px">${escChat(instr)}</div>` : ''}
    </div>`;
}
// сума заказу «150 EUR + 20 PLN» з payload.amounts (лічыць worker; нелічбавыя цэны прапушчаны)
function _cabAmountsStr(o) { return (o.amounts || []).map(a => `${a.sum} ${a.currency}`).join(' + '); }
function _cabDate(iso) { const [y, m, d] = String(iso).split('-'); return d && m ? `${d}.${m}.${y}` : iso; }

// ── 📅 «Мае запісы» — паказ + самакіраванне («кліент заўсёды правы», як падпіскі).
// `canManage` лічыць СЕРВЕР (палітыка паслугі `bookCancelLead` + мінулы час) — UI яе не ведае.
function renderCabinetAppts() {
  const el = document.getElementById('cab-appts');
  if (!el) return;
  const list = lastCabData?.appointments || [];
  if (!list.length) { el.innerHTML = ''; return; } // запісаў няма — секцыя не паказваецца
  const stColor = { scheduled: 'var(--accent)', confirmed: 'var(--success, #22c55e)', completed: 'var(--muted)', cancelled: 'var(--error, #ef4444)', no_show: '#f59e0b' };
  const btn = (label, fn, danger) => `<button onclick="${fn}" style="background:none;border:1px solid var(--border);border-radius:6px;color:${danger ? 'var(--error)' : 'var(--accent)'};cursor:pointer;font-size:0.78rem;padding:3px 8px">${escChat(label)}</button>`;
  const rows = list.map(a => {
    const nm = escChat(a.serviceName).replace(/'/g, '&#39;');
    const btns = a.canManage
      ? btn(PT.ap_move, `cabApptMove('${escChat(a.id)}','${escChat(a.serviceId)}','${nm}','${escChat(a.date)}')`)
        + ' ' + btn(PT.ap_cancel, `cabApptCancel('${escChat(a.id)}','${nm}')`, true)
      : '';
    return `<div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;margin-bottom:8px">
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <div style="flex:1;min-width:0">
          <div style="font-weight:600;font-size:0.9rem;color:var(--text)">${_cabDate(a.date)} <span style="color:var(--accent)">${escChat(a.time)}</span></div>
          <div style="font-size:0.82rem;color:var(--muted);margin-top:2px">${escChat(a.serviceName)}</div>
          <div style="font-size:0.78rem;color:${stColor[a.status] || 'var(--muted)'};margin-top:2px">● ${escChat(PT['ap_' + a.status] || a.status)}</div>
        </div>
        <div style="display:flex;gap:4px;flex-shrink:0">${btns}</div>
      </div>
    </div>`;
  }).join('');
  el.innerHTML = `<div class="prof-sec-title">📅 ${escChat(PT.appts_title)}</div>${rows}<div class="error-msg" id="cab-appts-msg" style="min-height:0;text-align:left"></div>`;
}
// паведамленне пад секцыяй запісаў (inline, НЕ сістэмны alert) — той жа патэрн, што _subsMsg
function _apptsMsg(txt, ok) {
  const m = document.getElementById('cab-appts-msg');
  if (m) { m.style.color = ok ? 'var(--success)' : 'var(--error)'; m.textContent = txt; if (ok) setTimeout(() => { if (m.textContent === txt) m.textContent = ''; }, 6000); }
}
// 🔄 Перанос — гэта БРОНЬ новага слота (portal_book з moveFrom), не праўка даты: тая ж мадалка, што на сайце
function cabApptMove(apptId, serviceId, name, date) {
  const nm = document.createElement('textarea'); nm.innerHTML = name || ''; // onclick-атрыбут нясе HTML-энтыці
  openSlotsModal({ api: API, repo: REPO, serviceId, name: nm.value, lang: detectPortalLang(), startDate: date,
    token: () => portalToken, moveFrom: apptId,
    labels: { title: PT.bk_move_title, date: PT.bk_date, time: PT.bk_time, loading: PT.bk_loading, none: PT.bk_none,
      confirm: PT.bk_move_confirm, done: PT.bk_move_done, taken: PT.bk_taken, err: PT.err_conn },
    confirm: (msg, onOk) => portalConfirm(msg, onOk),
    onDone: () => _cabApptReload() });
}
// ✕ Адмена — незваротная, таму з пацверджаннем (кастомным!); сервер вяртае свежы payload
function cabApptCancel(apptId, name) {
  const nm = document.createElement('textarea'); nm.innerHTML = name || '';
  portalConfirm(PT.ap_cancel_confirm.replace('{name}', nm.value), async () => {
    try {
      const res = await fetch(API, { method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'portal_appt_set', repo: REPO, token: portalToken, apptId, status: 'cancelled' }) });
      const d = await res.json().catch(() => ({}));
      if (!res.ok) { _apptsMsg(d.error === 'too_late' ? PT.ap_too_late : PT.err_conn); return; }
      lastCabData = d; renderCabinetAppts();
    } catch { _apptsMsg(PT.err_conn); }
  }, { okLabel: PT.ap_cancel, danger: true });
}
// пасля пераносу portal_book вяртае толькі {id,date,time} → перачытваем payload (запісы + іх canManage)
async function _cabApptReload() {
  try {
    const res = await fetch(API, { method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'portal_me', repo: REPO, token: portalToken }) });
    if (res.ok) { lastCabData = await res.json(); renderCabinetAppts(); }
  } catch { _apptsMsg(PT.err_conn); }
}

// ── 🔁 S1: «Мае падпіскі» — спіс + самакіраванне (кліент заўсёды правы: паўза/аднаўленне без пацверджання, адмена з confirm)
function renderCabinetSubs() {
  const el = document.getElementById('cab-subs');
  if (!el) return;
  const subs = lastCabData?.subscriptions || [];
  if (!subs.length) { el.innerHTML = ''; return; } // падпісак няма — секцыя не паказваецца
  const stColor = { active: 'var(--success, #22c55e)', paused: '#f59e0b', cancelled: 'var(--error, #ef4444)' };
  const rows = subs.map(s => {
    const per = s.period === 'year' ? PT.per_year : PT.per_month;
    const price = s.price ? `${s.price} ${s.currency}${per}` : '';
    const btn = (label, st, danger) => `<button onclick="cabSubSet('${escChat(s.id)}','${st}','${escChat(s.name).replace(/'/g, '&#39;')}')" style="background:none;border:1px solid var(--border);border-radius:6px;color:${danger ? 'var(--error)' : 'var(--accent)'};cursor:pointer;font-size:0.78rem;padding:3px 8px">${escChat(label)}</button>`;
    const btns = s.status === 'active' ? btn(PT.sub_pause, 'paused') + ' ' + btn(PT.sub_cancel, 'cancelled', true)
      : s.status === 'paused' ? btn(PT.sub_resume, 'active') + ' ' + btn(PT.sub_cancel, 'cancelled', true) : '';
    return `<div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;margin-bottom:8px">
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <div style="flex:1;min-width:0">
          <div style="font-weight:600;font-size:0.9rem;color:var(--text)">${escChat(s.name)}${price ? ` <span style="color:var(--accent)">${escChat(price)}</span>` : ''}</div>
          <div style="font-size:0.78rem;color:${stColor[s.status] || 'var(--muted)'}">● ${escChat(PT['sub_' + s.status] || s.status)}${s.status !== 'cancelled' && s.nextAt ? ` <span style="color:var(--muted)">· ${escChat(PT.sub_next)}: ${_cabDate(s.nextAt)}</span>` : ''}</div>
        </div>
        <div style="display:flex;gap:4px;flex-shrink:0">${btns}</div>
      </div>
    </div>`;
  }).join('');
  el.innerHTML = `<div class="prof-sec-title">🔁 ${escChat(PT.subs_title)}</div>${rows}<div class="error-msg" id="cab-subs-msg" style="min-height:0;text-align:left"></div>`;
}
async function cabSubSet(subId, status, name) {
  const doIt = async () => {
    try {
      const res = await fetch(API, { method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'portal_sub_set', repo: REPO, token: portalToken, subId, status }) });
      if (!res.ok) throw new Error();
      lastCabData = await res.json();
      renderCabinetSubs(); renderOrders(lastCabData); renderCabinetPayment();
    } catch { _subsMsg(PT.err_conn); }
  };
  if (status === 'cancelled') { // адмена незваротная — адзінае месца з пацверджаннем (кастомным!)
    const q = name ? PT.sub_cancel_confirm.replace('{name}', name)
      : PT.sub_cancel_confirm.replace(/[«„“"]?\{name\}[»“”"]?/, '').replace(/\s{2,}/g, ' '); // без назвы → без пустых «»
    portalConfirm(q, doIt, { okLabel: PT.sub_cancel, danger: true });
  } else doIt();
}
// паведамленне пад секцыяй падпісак (inline, НЕ сістэмны alert); секцыі можа не быць (0 падпісак) → ствараем трымальнік
function _subsMsg(txt, ok) {
  const host = document.getElementById('cab-subs');
  if (host && !document.getElementById('cab-subs-msg')) host.insertAdjacentHTML('beforeend', '<div class="error-msg" id="cab-subs-msg" style="min-height:0;text-align:left"></div>');
  const m = document.getElementById('cab-subs-msg');
  if (m) { m.style.color = ok ? 'var(--success)' : 'var(--error)'; m.textContent = txt; if (ok) setTimeout(() => { if (m.textContent === txt) m.textContent = ''; }, 6000); }
}
// намер «Падпісацца» з карткі сайта (localStorage, same-origin iframe — той жа патэрн, што chat_prefill).
// БЕЗ перапытвання (клік на кнопцы «Аформіць падпіску» і ёсць намер) і БЕЗ сістэмных alert — вынік inline.
async function portalSubIntentApply() {
  let intent = null;
  try { intent = JSON.parse(localStorage.getItem('ttzop_sub_intent') || 'null'); localStorage.removeItem('ttzop_sub_intent'); } catch {}
  if (!intent || !intent.id) return;
  portalSetView('cabinet'); // падпіскі жывуць у відзе Кабінет
  try {
    const res = await fetch(API, { method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'portal_subscribe', repo: REPO, token: portalToken, itemId: intent.id, lang: detectPortalLang() }) });
    const d = await res.json().catch(() => ({}));
    if (!res.ok) { _subsMsg(d.error === 'sub_exists' ? (PT.sub_active + ' ✓') : PT.err_conn, d.error === 'sub_exists'); return; } // дубль = ужо падпісаны
    lastCabData = d;
    renderCabinetSubs(); renderOrders(lastCabData); renderCabinetPayment();
    _subsMsg(PT.sub_done, true);
    document.getElementById('cab-subs')?.scrollIntoView({ behavior: 'smooth', block: 'start' }); // паказаць новую падпіску
  } catch { _subsMsg(PT.err_conn); }
}

// 📷 фота ад кліента (скрыншоты праблем): да 3 выяў, чып з ✕ да адпраўкі
let portalChatAtts = []; // [{data, contentType, fileName}]
// сціск выявы з dataURL (не чытаем файл двойчы) — вялікі скрыншот → webp ≤1600px
async function _portalShrink(dataUrl, type, fileName, maxDim) {
  if (!/^image\//.test(type || '') || type === 'image/gif') return null;
  try {
    const img = await new Promise((res, rej) => { const im = new Image(); im.onload = () => res(im); im.onerror = () => rej(0); im.src = dataUrl; });
    const k = Math.min(1, maxDim / Math.max(img.width, img.height));
    const c = document.createElement('canvas');
    c.width = Math.max(1, Math.round(img.width * k)); c.height = Math.max(1, Math.round(img.height * k));
    c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
    const blob = await new Promise(r => c.toBlob(r, 'image/webp', 0.85));
    if (!blob) return null;
    const data = await new Promise((res, rej) => { const rd = new FileReader(); rd.onload = () => res(String(rd.result).split(',')[1]); rd.onerror = () => rej(0); rd.readAsDataURL(blob); });
    return { data, contentType: 'image/webp', fileName: String(fileName || 'photo').replace(/\.[a-z0-9]+$/i, '') + '.webp' };
  } catch { return null; }
}
// надзейнае чытанне файла (той жа падыход, што ў панэлі): спярша file.arrayBuffer() — на Safari/WebKit
// чытае надзейней за FileReader; fallback FileReader; абедзве спробы кожны раунд. Кідае 'cloud:<прычына>'.
async function _portalReadDataUrl(file, statusCb) {
  const waits = [0, 1200, 2500, 5000, 10000];
  let lastErr = 'read';
  const ct = file.type || 'application/octet-stream';
  const toB64 = buf => { const bytes = new Uint8Array(buf); let bin = ''; const CH = 0x8000; for (let i = 0; i < bytes.length; i += CH) bin += String.fromCharCode.apply(null, bytes.subarray(i, i + CH)); return btoa(bin); };
  for (let i = 0; i < waits.length; i++) {
    if (waits[i]) { if (statusCb) statusCb(i); await new Promise(r => setTimeout(r, waits[i])); }
    try { const buf = await file.arrayBuffer(); if (buf && buf.byteLength) return `data:${ct};base64,${toB64(buf)}`; lastErr = 'empty'; }
    catch (e) { lastErr = e?.name || e?.message || 'read'; }
    try { const url = await new Promise((res, rej) => { const rd = new FileReader(); rd.onload = () => res(String(rd.result || '')); rd.onerror = () => rej(rd.error || new Error('read')); rd.readAsDataURL(file); }); if (url && url.indexOf(',') > 0 && url.split(',')[1]) return url; }
    catch (e) { lastErr = e?.name || e?.message || 'read'; }
  }
  throw new Error('cloud:' + lastErr);
}
async function portalChatAttach(input) {
  const file = input.files?.[0]; // ⚠️ НЕ чысцім input.value да чытання (на Safari/WebKit можа адвязаць File)
  if (!file || !file.type.startsWith('image/') || portalChatAtts.length >= 3) { input.value = ''; return; }
  const box = document.getElementById('portal-chat-atts');
  const sendBtn = document.getElementById('chat-send-btn'); if (sendBtn) sendBtn.disabled = true; // 🔒 Даслаць неактыўная пакуль грузіцца
  portalChatAttsRender(); if (box) box.innerHTML += ` <span style="color:var(--muted)">⏳ ${escChat(file.name)}</span>`;
  try {
    const dataUrl = await _portalReadDataUrl(file, () => { portalChatAttsRender(); if (box) box.innerHTML += ` <span style="color:var(--muted)">☁️⏳ ${escChat((PT.cloud_wait || '…') + ' ' + file.name)}</span>`; });
    const sh = await _portalShrink(dataUrl, file.type, file.name, 1600); // сціск з ужо прачытаных байтаў
    portalChatAtts.push(sh || { data: dataUrl.split(',')[1], contentType: file.type, fileName: file.name });
    portalChatAttsRender();
  } catch (e) {
    console.warn('[cabinet attach fail]', file.name, String(e?.message || 'read')); // тэхпрычына — у консоль, кліенту не паказваем
    portalChatAttsRender();
    portalConfirm('☁️ ' + (PT.cloud_err || 'Cloud file not downloaded yet').replace('{name}', file.name), null, { okOnly: true }); // інфа-мадалка (сістэмны alert забаронены)
  } finally {
    try { input.value = ''; } catch (e) {} // цяпер бяспечна: чытанне завершана (дазваляе перавыбраць той жа файл)
    if (sendBtn) sendBtn.disabled = false; // 🔓 разблакаваць Даслаць
  }
}
function portalChatAttDel(i) { portalChatAtts.splice(i, 1); portalChatAttsRender(); }
function portalChatAttsRender() {
  document.getElementById('portal-chat-atts').innerHTML = portalChatAtts.map((a, i) =>
    `<span style="display:inline-flex;align-items:center;gap:4px;border:1px solid var(--border);border-radius:6px;padding:2px 6px;margin:2px 4px 0 0">📷 ${escChat(a.fileName)}
      <span style="opacity:0.6;font-size:0.72rem">(${i + 1}/${portalChatAtts.length})</span><!-- нумар файла з агульнай колькасці (макс 3) -->
      <button style="background:none;border:none;color:var(--error);cursor:pointer;padding:0 2px" onclick="portalChatAttDel(${i})">✕</button></span>`).join('');
}

      setMsg('privacy-msg', PT.err_conn);
    }
  } catch { setMsg('privacy-msg', PT.err_conn); }
}

applyPortalLang();
initPortalLangPicker();
// ?inv={key} — публічны прагляд фактуры па share-спасылцы (без уваходу); інакш звычайны кабінет
const _invKey = new URLSearchParams(location.search).get('inv');
if (_invKey) portalInvoiceView(_invKey).then(ok => { if (!ok) portalAutoLogin(); }); // мёртвы ключ → звычайны кабінет
else portalAutoLogin(); // захаваная сесія → адразу ў кабінет без кода

// ✕ кабінета: бачны ТОЛЬКІ калі старонка адкрыта як оверлей на сайце (у iframe) — закрывае бацькоўскі оверлей без разлагіну.
// Пры прамым адкрыцці /portal крыжык няма (няма куды закрываць).
function portalCloseCabinet() { try { window.parent.closeCabinet(); } catch (e) { location.href = '/'; } }
if (window.self !== window.top) { const _cb = document.getElementById('portal-close'); if (_cb) _cb.style.display = ''; }

document.getElementById('portal-code').addEventListener('keydown', e => { if (e.key === 'Enter') portalVerifyCode(); });
document.getElementById('portal-email').addEventListener('keydown', e => { if (e.key === 'Enter') portalSendCode(); });
document.getElementById('portal-chat-input').addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); portalChatSend(); } }); // Enter=даслаць, Shift+Enter=новы радок
</script>
