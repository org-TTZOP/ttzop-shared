<!DOCTYPE html>
<html lang="be">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Гульня 2048</title>
    <style>
        body {
            font-family: 'Clear Sans', 'Helvetica Neue', Arial, sans-serif;
            background-color: #faf8ef;
            color: #776e65;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            user-select: none;
        }

        .heading {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 340px;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 48px;
            font-weight: bold;
            margin: 0;
            color: #776e65;
        }

        .scores-container {
            display: flex;
            gap: 10px;
        }

        .score-box {
            background: #bbada0;
            color: white;
            min-width: 60px;
            padding: 5px 10px;
            font-size: 14px;
            font-weight: bold;
            text-align: center;
            border-radius: 3px;
        }

        .score-box span {
            display: block;
            font-size: 20px;
        }

        .above-game {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 340px;
            margin-bottom: 15px;
        }

        .restart-btn {
            background: #8f7a66;
            color: #f9f6f2;
            border: none;
            padding: 10px 15px;
            font-weight: bold;
            border-radius: 3px;
            cursor: pointer;
            font-size: 15px;
        }

        .restart-btn:hover {
            background: #9f8a76;
        }

        #grid-container {
            width: 340px;
            height: 340px;
            background-color: #bbada0;
            border-radius: 6px;
            padding: 10px;
            box-sizing: border-box;
            display: grid;
            grid-template-columns: repeat(4, 70px);
            grid-template-rows: repeat(4, 70px);
            gap: 10px;
            position: relative;
        }

        .cell {
            width: 70px;
            height: 70px;
            background-color: rgba(238, 228, 218, 0.35);
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            box-sizing: border-box;
        }

        /* Стылі для плітак */
        .tile-2 { background: #eee4da; color: #776e65; }
        .tile-4 { background: #ede0c8; color: #776e65; }
        .tile-8 { background: #f2b179; color: #f9f6f2; }
        .tile-16 { background: #f59563; color: #f9f6f2; }
        .tile-32 { background: #f67c5f; color: #f9f6f2; }
        .tile-64 { background: #f65e3b; color: #f9f6f2; }
        .tile-128 { background: #edcf72; color: #f9f6f2; font-size: 24px; }
        .tile-256 { background: #edcc61; color: #f9f6f2; font-size: 24px; }
        .tile-512 { background: #edc850; color: #f9f6f2; font-size: 24px; }
        .tile-1024 { background: #edc53f; color: #f9f6f2; font-size: 20px; }
        .tile-2048 { background: #edc22e; color: #f9f6f2; font-size: 20px; }

        #game-over-overlay {
            display: none;
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(238, 228, 218, 0.73);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            z-index: 10;
        }

        #game-over-overlay p {
            font-size: 30px;
            font-weight: bold;
            margin: 0 0 20px 0;
        }
    </style>
</head>
<body>

    <div class="heading">
        <h1>2048</h1>
        <div class="scores-container">
            <div class="score-box">Балы<span id="score">0</span></div>
            <div class="score-box">Рэкорд<span id="best">0</span></div>
        </div>
    </div>

    <div class="above-game">
        <p>Збірайце пліткі да <b>2048!</b></p>
        <button class="restart-btn" onclick="resetGame()">Новая гульня</button>
    </div>

    <div id="grid-container">
        <div id="game-over-overlay">
            <p>Гульня скончана!</p>
            <button class="restart-btn" onclick="resetGame()">Паспрабаваць зноў</button>
        </div>
    </div>

    <script>
        const SIZE = 4;
        let board = Array(SIZE).fill(null).map(() => Array(SIZE).fill(0));
        let score = 0;
        let best = localStorage.getItem('best_2048') ? parseInt(localStorage.getItem('best_2048')) : 0;

        const gridContainer = document.getElementById('grid-container');
        const scoreElement = document.getElementById('score');
        const bestElement = document.getElementById('best');
        const overlay = document.getElementById('game-over-overlay');

        // Ствараем клеткі адзін раз пры загрузцы
        function createGrid() {
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    const cell = document.createElement('div');
                    cell.classList.add('cell');
                    cell.id = `cell-${r}-${c}`;
                    gridContainer.appendChild(cell);
                }
            }
            bestElement.innerText = best;
        }

        function resetGame() {
            board = Array(SIZE).fill(null).map(() => Array(SIZE).fill(0));
            score = 0;
            scoreElement.innerText = score;
            overlay.style.display = 'none';
            addRandomTile();
            addRandomTile();
            updateGridDOM();
        }

        function addRandomTile() {
            let emptyCells = [];
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    if (board[r][c] === 0) emptyCells.push({r, c});
                }
            }
            if (emptyCells.length > 0) {
                let {r, c} = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                board[r][c] = Math.random() < 0.9 ? 2 : 4;
            }
        }

        function updateGridDOM() {
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    const cell = document.getElementById(`cell-${r}-${c}`);
                    cell.className = 'cell'; 
                    cell.innerText = '';
                    
                    if (board[r][c] > 0) {
                        cell.innerText = board[r][c];
                        cell.classList.add(`tile-${board[r][c]}`);
                    }
                }
            }
        }

        function slide(row) {
            let arr = row.filter(val => val); 
            for (let i = 0; i < arr.length - 1; i++) {
                if (arr[i] === arr[i + 1]) {
                    arr[i] *= 2;
                    score += arr[i];
                    arr[i + 1] = 0;
                }
            }
            arr = arr.filter(val => val);
            while (arr.length < SIZE) {
                arr.push(0);
            }
            return arr;
        }

        function moveLeft() {
            let changed = false;
            for (let r = 0; r < SIZE; r++) {
                let oldRow = [...board[r]];
                board[r] = slide(board[r]);
                if (JSON.stringify(oldRow) !== JSON.stringify(board[r])) changed = true;
            }
            return changed;
        }

        function moveRight() {
            let changed = false;
            for (let r = 0; r < SIZE; r++) {
                let oldRow = [...board[r]];
                board[r] = slide(board[r].reverse()).reverse();
                if (JSON.stringify(oldRow) !== JSON.stringify(board[r])) changed = true;
            }
            return changed;
        }

        function moveUp() {
            let changed = false;
            for (let c = 0; c < SIZE; c++) {
                let col = [board[0][c], board[1][c], board[2][c], board[3][c]];
                let oldCol = [...col];
                col = slide(col);
                for (let r = 0; r < SIZE; r++) {
                    board[r][c] = col[r];
                }
                if (JSON.stringify(oldCol) !== JSON.stringify(col)) changed = true;
            }
            return changed;
        }

        function moveDown() {
            let changed = false;
            for (let c = 0; c < SIZE; c++) {
                let col = [board[0][c], board[1][c], board[2][c], board[3][c]];
                let oldCol = [...col];
                col = slide(col.reverse()).reverse();
                for (let r = 0; r < SIZE; r++) {
                    board[r][c] = col[r];
                }
                if (JSON.stringify(oldCol) !== JSON.stringify(col)) changed = true;
            }
            return changed;
        }

        function isGameOver() {
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    if (board[r][c] === 0) return false;
                    if (r < SIZE - 1 && board[r][c] === board[r + 1][c]) return false;
                    if (c < SIZE - 1 && board[r][c] === board[r][c + 1]) return false;
                }
            }
            return true;
        }

        window.addEventListener('keydown', (e) => {
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                e.preventDefault(); // каб старонка не круцілася пры націсканні стрэлак
            }

            let moved = false;
            if (e.key === 'ArrowLeft') moved = moveLeft();
            else if (e.key === 'ArrowRight') moved = moveRight();
            else if (e.key === 'ArrowUp') moved = moveUp();
            else if (e.key === 'ArrowDown') moved = moveDown();

            if (moved) {
                addRandomTile();
                updateGridDOM();
                scoreElement.innerText = score;
                
                if (score > best) {
                    best = score;
                    bestElement.innerText = best;
                    localStorage.setItem('best_2048', best);
                }

                if (isGameOver()) {
                    overlay.style.display = 'flex';
                }
            }
        });

        // Запуск
        createGrid();
        resetGame();
    </script>
</body>
</html>
