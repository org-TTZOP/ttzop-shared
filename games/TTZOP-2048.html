<!DOCTYPE html>
<html lang="be">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Гульня 2048</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
    :root {
        --bg-page: #10131a;
        --bg-panel: #1a2030;
        --bg-panel-soft: #171c26;
        --bg-cell: rgba(255, 255, 255, 0.045);
        --border: rgba(255, 255, 255, 0.08);
        --text-primary: #eef1f6;
        --text-muted: #8893a8;
        --accent: #f5821f;
        --accent-hover: #ff9740;
        --accent-soft: rgba(245, 130, 31, 0.16);
        --green: #22c55e;
        --green-soft: rgba(34, 197, 94, 0.15);
        --red: #ef4444;
        --red-soft: rgba(239, 68, 68, 0.15);
        --radius-lg: 16px;
        --radius-md: 10px;
        --radius-sm: 6px;
        --cell-size: 70px;
        --gap: 12px;
        --pad: 12px;
    }

    @media (max-width: 480px) {
        :root {
            --cell-size: 58px;
            --gap: 8px;
            --pad: 10px;
        }
    }

    * { box-sizing: border-box; }

    body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg-page);
        font-family: 'Inter', -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;
        color: var(--text-primary);
        -webkit-tap-highlight-color: transparent;
    }

    .app {
        width: calc(var(--cell-size) * 4 + var(--gap) * 3 + var(--pad) * 2 + 2px);
        margin: 24px auto;
        display: flex;
        flex-direction: column;
        gap: 16px;
        user-select: none;
    }

    /* Верхні блок з назвай і балямі */
    .topbar {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        gap: 12px;
    }

    .title-row {
        display: flex;
        align-items: center;
        gap: 8px;
    }

    h1 {
        margin: 0;
        font-size: 30px;
        font-weight: 800;
        letter-spacing: -0.5px;
        color: var(--text-primary);
    }

    .badge-tag {
        font-size: 11px;
        font-weight: 700;
        color: var(--accent);
        background: var(--accent-soft);
        padding: 3px 8px;
        border-radius: 999px;
        letter-spacing: 0.3px;
    }

    .subtitle {
        margin: 4px 0 0;
        font-size: 13px;
        color: var(--text-muted);
    }

    .scores {
        display: flex;
        gap: 8px;
        flex-shrink: 0;
    }

    .score-box {
        position: relative;
        overflow: hidden;
        background: var(--bg-panel-soft);
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        padding: 7px 14px 7px 16px;
        min-width: 56px;
        text-align: center;
    }

    .score-box::before {
        content: '';
        position: absolute;
        left: 0; top: 0; bottom: 0;
        width: 3px;
        background: var(--accent);
    }

    .score-label {
        display: block;
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.4px;
        text-transform: uppercase;
        color: var(--text-muted);
    }

    .score-value {
        display: block;
        font-size: 19px;
        font-weight: 800;
        color: var(--text-primary);
        margin-top: 2px;
    }

    /* Панэль статусу і кнопкі рэстарту */
    .toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: var(--bg-panel-soft);
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        padding: 8px 8px 8px 14px;
    }

    .status-pill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        font-weight: 600;
        padding: 5px 10px;
        border-radius: 999px;
        background: var(--green-soft);
        color: var(--green);
        transition: background 0.25s, color 0.25s;
    }

    .status-pill.win { background: var(--accent-soft); color: var(--accent); }
    .status-pill.over { background: var(--red-soft); color: var(--red); }

    .status-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: currentColor;
    }

    .icon-btn {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        border: none;
        background: var(--accent);
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: background 0.2s, transform 0.15s;
        flex-shrink: 0;
    }

    .icon-btn:hover { background: var(--accent-hover); }
    .icon-btn:active { transform: scale(0.92); }
    .icon-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }

    /* Картка гульнявога поля */
    .board-card {
        background: var(--bg-panel);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: var(--pad);
    }

    #grid-container {
        position: relative;
        display: grid;
        grid-template-columns: repeat(4, var(--cell-size));
        grid-template-rows: repeat(4, var(--cell-size));
        gap: var(--gap);
    }

    .cell {
        width: var(--cell-size);
        height: var(--cell-size);
        background: var(--bg-cell);
        border-radius: var(--radius-sm);
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 800;
        font-size: calc(var(--cell-size) * 0.4);
        transition: background 0.15s, color 0.15s;
    }

    /* Колеры плітак: ад цёмна-сіняга да фірмовага аранжавага */
    .tile-2 { background: #283246; color: #dfe6f0; }
    .tile-4 { background: #303c54; color: #e7edf6; }
    .tile-8 { background: #3c4c6a; color: #ffffff; }
    .tile-16 { background: #4a5d80; color: #ffffff; }
    .tile-32 { background: #d9763a; color: #ffffff; }
    .tile-64 { background: #e8862e; color: #ffffff; }
    .tile-128 { background: #f5821f; color: #ffffff; font-size: calc(var(--cell-size) * 0.32); }
    .tile-256 { background: #f57316; color: #ffffff; font-size: calc(var(--cell-size) * 0.32); }
    .tile-512 { background: #f2640f; color: #ffffff; font-size: calc(var(--cell-size) * 0.32); }
    .tile-1024 { background: #ef5a0c; color: #ffffff; font-size: calc(var(--cell-size) * 0.27); }
    .tile-2048 {
        background: linear-gradient(135deg, #ffd166, #f5821f);
        color: #241405;
        font-size: calc(var(--cell-size) * 0.27);
        animation: glow-pulse 2.2s ease-in-out infinite;
    }

    @keyframes pop {
        0% { transform: scale(0.5); opacity: 0; }
        60% { transform: scale(1.06); opacity: 1; }
        100% { transform: scale(1); }
    }

    @keyframes glow-pulse {
        0%, 100% { box-shadow: 0 0 12px rgba(245, 130, 31, 0.45); }
        50% { box-shadow: 0 0 22px rgba(245, 130, 31, 0.8); }
    }

    .cell.pop { animation: pop 0.18s ease-out; }
    .cell.pop.tile-2048 { animation: pop 0.18s ease-out, glow-pulse 2.2s ease-in-out infinite; }

    @media (prefers-reduced-motion: reduce) {
        .cell.pop, .cell.pop.tile-2048, .tile-2048 { animation: none; }
        .tile-2048 { box-shadow: 0 0 14px rgba(245, 130, 31, 0.5); }
    }

    #game-over-overlay {
        display: none;
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(16, 19, 26, 0.82);
        flex-direction: column;
        align-items: center;
        justify-content: center;
        border-radius: calc(var(--radius-lg) - 4px);
        z-index: 10;
        gap: 16px;
    }

    #game-over-overlay p {
        font-size: 22px;
        font-weight: 800;
        margin: 0;
        color: var(--text-primary);
    }

    .retry-btn {
        background: var(--accent);
        color: #fff;
        border: none;
        padding: 10px 20px;
        font-weight: 700;
        font-size: 14px;
        border-radius: var(--radius-md);
        cursor: pointer;
        transition: background 0.2s;
    }

    .retry-btn:hover { background: var(--accent-hover); }
    .retry-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }

    .hint {
        margin: 0;
        text-align: center;
        font-size: 12px;
        color: var(--text-muted);
    }
</style>
</head>
<body>

    <div class="app">
        <div class="topbar">
            <div class="title-group">
                <div class="title-row">
                    <h1>2048</h1>
                    <span class="badge-tag">4×4</span>
                </div>
                <p class="subtitle">Збірайце пліткі да 2048</p>
            </div>
            <div class="scores">
                <div class="score-box">
                    <span class="score-label">Балы</span>
                    <span class="score-value" id="score">0</span>
                </div>
                <div class="score-box">
                    <span class="score-label">Рэкорд</span>
                    <span class="score-value" id="best">0</span>
                </div>
            </div>
        </div>

        <div class="toolbar">
            <div class="status-pill active" id="status-pill">
                <span class="status-dot"></span>
                <span id="status-text">Актыўна</span>
            </div>
            <button class="icon-btn" id="restart-btn" title="Новая гульня" aria-label="Новая гульня">
                <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="23 4 23 10 17 10"></polyline>
                    <polyline points="1 20 1 14 7 14"></polyline>
                    <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                </svg>
            </button>
        </div>

        <div class="board-card">
            <div id="grid-container">
                <div id="game-over-overlay">
                    <p>Гульня скончана!</p>
                    <button class="retry-btn" id="retry-btn">Паспрабаваць зноў</button>
                </div>
            </div>
        </div>

        <p class="hint">Стрэлкі або свайп, каб рухаць пліткі</p>
    </div>

    <script>
        const SIZE = 4;
        let board = Array(SIZE).fill(null).map(() => Array(SIZE).fill(0));
        let score = 0;
        let best = localStorage.getItem('best_2048') ? parseInt(localStorage.getItem('best_2048')) : 0;
        let hasWon = false;
        let lastNewTile = null;

        const gridContainer = document.getElementById('grid-container');
        const scoreElement = document.getElementById('score');
        const bestElement = document.getElementById('best');
        const overlay = document.getElementById('game-over-overlay');
        const statusPill = document.getElementById('status-pill');
        const statusText = document.getElementById('status-text');

        // Ствараем клеткі адзін раз пры загрузцы
        function createGrid() {
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    const cell = document.createElement('div');
                    cell.classList.add('cell');
                    cell.id = `cell-${r}-${c}`;
                    gridContainer.appendChild(cell);
                }
            }
            bestElement.innerText = best;
        }

        function setStatus(state) {
            statusPill.classList.remove('active', 'win', 'over');
            statusPill.classList.add(state);
            if (state === 'over') statusText.innerText = 'Скончана';
            else if (state === 'win') statusText.innerText = 'Перамога!';
            else statusText.innerText = 'Актыўна';
        }

        function resetGame() {
            board = Array(SIZE).fill(null).map(() => Array(SIZE).fill(0));
            score = 0;
            hasWon = false;
            lastNewTile = null;
            scoreElement.innerText = score;
            overlay.style.display = 'none';
            addRandomTile();
            addRandomTile();
            updateGridDOM();
            setStatus('active');
        }

        function addRandomTile() {
            let emptyCells = [];
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    if (board[r][c] === 0) emptyCells.push({r, c});
                }
            }
            if (emptyCells.length > 0) {
                let {r, c} = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                board[r][c] = Math.random() < 0.9 ? 2 : 4;
                lastNewTile = {r, c};
            }
        }

        function updateGridDOM() {
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    const cell = document.getElementById(`cell-${r}-${c}`);
                    cell.className = 'cell';
                    cell.innerText = '';

                    if (board[r][c] > 0) {
                        cell.innerText = board[r][c];
                        cell.classList.add(`tile-${board[r][c]}`);
                        if (lastNewTile && r === lastNewTile.r && c === lastNewTile.c) {
                            cell.classList.add('pop');
                        }
                        if (board[r][c] >= 2048) hasWon = true;
                    }
                }
            }
        }

        function slide(row) {
            let arr = row.filter(val => val);
            for (let i = 0; i < arr.length - 1; i++) {
                if (arr[i] === arr[i + 1]) {
                    arr[i] *= 2;
                    score += arr[i];
                    arr[i + 1] = 0;
                }
            }
            arr = arr.filter(val => val);
            while (arr.length < SIZE) {
                arr.push(0);
            }
            return arr;
        }

        function moveLeft() {
            let changed = false;
            for (let r = 0; r < SIZE; r++) {
                let oldRow = [...board[r]];
                board[r] = slide(board[r]);
                if (JSON.stringify(oldRow) !== JSON.stringify(board[r])) changed = true;
            }
            return changed;
        }

        function moveRight() {
            let changed = false;
            for (let r = 0; r < SIZE; r++) {
                let oldRow = [...board[r]];
                board[r] = slide(board[r].reverse()).reverse();
                if (JSON.stringify(oldRow) !== JSON.stringify(board[r])) changed = true;
            }
            return changed;
        }

        function moveUp() {
            let changed = false;
            for (let c = 0; c < SIZE; c++) {
                let col = [board[0][c], board[1][c], board[2][c], board[3][c]];
                let oldCol = [...col];
                col = slide(col);
                for (let r = 0; r < SIZE; r++) {
                    board[r][c] = col[r];
                }
                if (JSON.stringify(oldCol) !== JSON.stringify(col)) changed = true;
            }
            return changed;
        }

        function moveDown() {
            let changed = false;
            for (let c = 0; c < SIZE; c++) {
                let col = [board[0][c], board[1][c], board[2][c], board[3][c]];
                let oldCol = [...col];
                col = slide(col.reverse()).reverse();
                for (let r = 0; r < SIZE; r++) {
                    board[r][c] = col[r];
                }
                if (JSON.stringify(oldCol) !== JSON.stringify(col)) changed = true;
            }
            return changed;
        }

        function isGameOver() {
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    if (board[r][c] === 0) return false;
                    if (r < SIZE - 1 && board[r][c] === board[r + 1][c]) return false;
                    if (c < SIZE - 1 && board[r][c] === board[r][c + 1]) return false;
                }
            }
            return true;
        }

        function afterMove() {
            addRandomTile();
            updateGridDOM();
            scoreElement.innerText = score;

            if (score > best) {
                best = score;
                bestElement.innerText = best;
                localStorage.setItem('best_2048', best);
            }

            if (isGameOver()) {
                setStatus('over');
                overlay.style.display = 'flex';
            } else if (hasWon) {
                setStatus('win');
            } else {
                setStatus('active');
            }
        }

        function handleMove(direction) {
            let moved = false;
            if (direction === 'left') moved = moveLeft();
            else if (direction === 'right') moved = moveRight();
            else if (direction === 'up') moved = moveUp();
            else if (direction === 'down') moved = moveDown();
            if (moved) afterMove();
        }

        window.addEventListener('keydown', (e) => {
            const keyMap = { ArrowLeft: 'left', ArrowRight: 'right', ArrowUp: 'up', ArrowDown: 'down' };
            if (keyMap[e.key]) {
                e.preventDefault(); // каб старонка не круцілася пры націсканні стрэлак
                handleMove(keyMap[e.key]);
            }
        });

        // Падтрымка свайпаў для мабільных
        let touchStartX = 0, touchStartY = 0;
        gridContainer.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
        }, { passive: true });

        gridContainer.addEventListener('touchend', (e) => {
            const dx = e.changedTouches[0].screenX - touchStartX;
            const dy = e.changedTouches[0].screenY - touchStartY;
            if (Math.max(Math.abs(dx), Math.abs(dy)) < 24) return;
            if (Math.abs(dx) > Math.abs(dy)) {
                handleMove(dx > 0 ? 'right' : 'left');
            } else {
                handleMove(dy > 0 ? 'down' : 'up');
            }
        }, { passive: true });

        document.getElementById('restart-btn').addEventListener('click', resetGame);
        document.getElementById('retry-btn').addEventListener('click', resetGame);

        // Запуск
        createGrid();
        resetGame();
    </script>
</body>
</html>
