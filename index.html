<!DOCTYPE html>
<html lang="be" data-theme="steel">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="">
  <title></title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="assets/css/themes.css">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<!-- ========== NAVBAR ========== -->
<nav class="navbar" id="navbar">
  <div class="container navbar-inner">
    <button class="navbar-burger" id="burger" aria-label="Меню">&#9776;</button><!-- злева, бачны на ЎСІХ экранах (логіка як у панэлі) -->
    <a class="navbar-logo" href="#hero"><span id="site-logo-img"></span><span id="site-logo">Назва</span> <span id="site-version" style="font-size:1rem;font-family:var(--font-main);font-weight:700"></span></a><!-- site-logo-img: выява лагатыпа (main.js ← settings.company.logo); site-version: версія білда (admin/version.js), яркая па просьбе карыстальніка -->

    <ul class="navbar-menu" id="navbar-menu"><!-- 🧱 будуецца дынамічна з уключаных секцый (buildSiteNav) --></ul>
    <div class="navbar-actions">
      <a href="#" id="nav-cart" onclick="openCartModal();return false" style="display:none;text-decoration:none;font-size:1rem;white-space:nowrap;position:relative;cursor:pointer" title="">🛒 <span class="cart-count" style="display:inline-block;min-width:16px;height:16px;padding:0 4px;border-radius:8px;background:#f97316;color:#fff;font-size:0.68rem;line-height:16px;text-align:center;font-weight:700;vertical-align:middle">0</span></a><!-- 🛒 кошык у навбары: колькасць у бэйджы; клік → мадалка кошыка (замяніў ніжні cart-bar) -->
      <a href="/portal.html" id="nav-cabinet" onclick="if(window.toggleCabinetMenu){toggleCabinetMenu(event);return false}" style="text-decoration:none;font-size:0.88rem;white-space:nowrap;cursor:pointer" title="">👤 <span data-i18n="nav_cabinet">Кабінет</span></a><!-- 👤 Кабінет: клік → выпадаючае меню (💬 Чат · 👤 Кабінет · 🚪 Выйсці); href — fallback без JS -->
      <div id="site-lang-picker"></div>
    </div>
  </div>
</nav>
<div id="nav-backdrop"></div><!-- зацямненне пад мабільным drawer навігацыі (як #sidebar-backdrop у панэлі) -->

<!-- ========== 1. HERO ========== -->
<section id="hero" class="hero s-dark">
  <div class="container hero-inner">
    <div class="hero-meta">
      <span id="hero-phone"></span>
      <span id="hero-hours"></span>
    </div>
    <h1 class="hero-title" id="hero-title"></h1>
    <p class="hero-subtitle" id="hero-subtitle"></p>
    <div class="hero-btns">
      <a href="#contact" class="btn btn-primary" id="hero-btn-primary"></a>
      <a href="#services" class="btn btn-outline" id="hero-btn-secondary"></a>
    </div>
  </div>
</section>

<!-- ========== 🧱 ДЫНАМІЧНЫЯ СЕКЦЫІ ========== -->
<!-- Усе кантэнт-секцыі рэндэрацца тут са спіса `sections` (renderDynamicSections):
     любы лік, любы тып, любы парадак. Дадаць секцыю = запіс у спіс, нуль кода. -->
<main id="site-sections"></main>

<!-- ========== 15. КАНТАКТЫ + ФОРМА ========== -->
<section id="contact" class="s-alt section">
  <div class="container">
    <h2 class="section-title" data-i18n="contact_title">Кантакты</h2>
    <div class="contact-layout">

      <!-- Інфармацыя -->
      <div class="contact-info">
        <div class="contact-item">
          <span class="contact-icon">📍</span>
          <span id="contact-address"></span>
        </div>
        <div class="contact-item">
          <span class="contact-icon">📞</span>
          <span id="contact-phone"></span>
        </div>
        <div class="contact-item">
          <span class="contact-icon">🕐</span>
          <span id="contact-hours"></span>
        </div>
        <!-- Email маршрутызацыя -->
        <div id="contact-emails"></div>
      </div>

      <!-- Форма запісу / чат кабінета -->
      <div class="contact-form-wrap">
        <h3 data-i18n="form_title">Запісацца на сэрвіс</h3>
        <!-- 💬 CTA у чат Кабінета (дэфолт; заяўкі трапляюць у панэль, не толькі на пошту) -->
        <div id="contact-chat-cta" style="display:none">
          <p style="opacity:0.8;margin-bottom:16px" data-i18n="contact_chat_desc">Напішыце нам у чаце — адкажам там жа, а копія адказу прыйдзе вам на пошту.</p>
          <a href="/portal.html" class="btn btn-primary" onclick="if(window.openCabinet){openCabinet();return false}">💬 <span data-i18n="contact_chat_btn">Напісаць у чат</span></a>
        </div>
        <!-- Web3Forms-канал АДКЛЮЧАНЫ па змаўчанні (вяртанне: settings.contactForm.web3 = true), код пакінуты знарок -->
        <form id="booking-form" action="https://api.web3forms.com/submit" method="POST">
          <input type="hidden" name="access_key" id="w3f-key">
          <input type="hidden" name="subject" value="Новая заяўка з сайта">
          <input type="text"     name="name"    required
                 data-i18n-placeholder="form_name"    placeholder="Ваша імя">
          <input type="tel"      name="phone"   required
                 data-i18n-placeholder="form_phone"   placeholder="Тэлефон">
          <!-- дадатковае поле формы: паказваецца толькі калі settings.contactForm.car !== false
               (санацыя v4.449: аўтасэрвіс-спецыфіка ва ўніверсальным шаблоне — цяпер наладжвальна) -->
          <input type="text"     name="car"    id="form-car-field"
                 data-i18n-placeholder="form_car"     placeholder="Марка і мадэль аўто">
          <textarea name="message" rows="4"
                 data-i18n-placeholder="form_message" placeholder="Апішыце праблему"></textarea>
          <button type="submit" class="btn btn-primary" data-i18n="form_submit">Адправіць заяўку</button>
        </form>
      </div>

    </div>
  </div>
</section>

<!-- ========== 16. КАРТА ========== -->
<section id="map" class="s-light map-section">
  <div id="map-container"></div>
  <div class="container" style="text-align:center; padding-top:16px;">
    <a id="google-maps-link" href="#" target="_blank" class="btn btn-outline">
      🗺️ <span data-i18n="maps_btn">Адкрыць у Google Maps</span>
    </a>
  </div>
</section>

<!-- ========== FOOTER ========== -->
<footer class="footer s-dark">
  <div class="container footer-inner">

    <div class="footer-col">
      <div class="footer-logo" id="footer-logo"></div>
      <p class="footer-desc text-muted" data-i18n="footer_desc">Прафесійны аўтасэрвіс</p>
      <p class="footer-phone" id="footer-phone"></p>
      <p class="footer-hours text-muted" id="footer-hours"></p>
    </div>

    <div class="footer-col">
      <h4 data-i18n="footer_nav">Навігацыя</h4>
      <ul id="footer-nav"><!-- 🧱 будуецца дынамічна (buildSiteNav), сінхронна з уключанымі секцыямі --></ul>
    </div>

    <div class="footer-col">
      <h4 data-i18n="footer_contacts">Кантакты</h4>
      <div id="footer-emails"></div>
    </div>

    <div class="footer-col">
      <h4 data-i18n="footer_legal">Дакументы</h4>
      <ul>
        <li><a href="/privacy" data-i18n="footer_privacy">Палітыка прыватнасці</a></li>
        <li><a href="/portal.html" data-i18n="footer_portal" onclick="if(window.openCabinet){openCabinet();return false}">Мае заказы</a></li>
        <li><a href="/admin" target="_blank" rel="noopener" style="opacity:0.4;font-size:1.1rem" title="Admin">⚙</a></li>
      </ul>
    </div>

  </div>
  <div class="footer-bottom">
    <p id="footer-copy"></p>
    <div id="footer-social" style="margin-top:6px"></div><!-- К3b: сацсеткі з секцыі «Футэр» (Структура сайта) -->
  </div>
</footer>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="admin/version.js"></script><!-- APP_VERSION — адзіная крыніца версіі (тая ж, што ў панэлі) -->
<script src="assets/js/reader.js"></script><!-- 📄 універсальны чытач дакумента (навіны/фактура/справаздачы) -->
<script src="assets/js/slots-modal.js"></script><!-- 📅 універсальная мадалка вольных слотаў (бронь; кабінет — перанос) -->
<script src="assets/js/cdate.js"></script><!-- 📅 фірменны каляндар-папап (Чарнавік: дата навіны і інш.) -->
<script src="assets/js/photoedit.js"></script><!-- ✂️ універсальны фота-рэдактар (Чарнавік: +📎 фота) -->
<script src="assets/js/main.js"></script>
</body>
</html>
